change_log:
  - version: "0.2"
    date: "2026-05-02"
    changes:
      - "Added existence_proof binding to issuer identity and authority."
      - "Added validity window and revocation-aware verification model."
      - "Added actionable vs non_actionable derived status semantics."
      - "Preserved lightweight attestation envelope structure from v0.1."
